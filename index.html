<script>
  const docsInput = document.getElementById('docs');
  const fileName = document.getElementById('fileName');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const resultDiv = document.getElementById('result');
  const addressInput = document.getElementById('address');

  docsInput.addEventListener('change', () => {
    const files = Array.from(docsInput.files);

    if (!files.length) {
      fileName.textContent = '';
      return;
    }

    fileName.textContent = files.length === 1
      ? files[0].name
      : `${files.length} files selected`;
  });

  async function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
    });
  }

  analyzeBtn.addEventListener('click', async () => {
    const address = addressInput.value;
    const files = Array.from(docsInput.files);

    analyzeBtn.textContent = 'Analyzing...';
    analyzeBtn.disabled = true;
    resultDiv.textContent = 'Analyzing HOA documents...';

    try {
      let processedFiles = [];

      for (const file of files) {
        if (file.type === "application/pdf") {
          const base64 = await fileToBase64(file);
          processedFiles.push({
            type: "pdf",
            name: file.name,
            data: base64
          });
        } else {
          const text = await file.text();
          processedFiles.push({
            type: "text",
            name: file.name,
            data: text.substring(0, 5000)
          });
        }
      }

      const response = await fetch('/.netlify/functions/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          address: address,
          files: processedFiles
        })
      });

      const data = await response.json();

      try {
        const parsed = JSON.parse(data.output);

        resultDiv.innerHTML = `
          <h3>${parsed.summary}</h3>
          ${parsed.items.map(item => `
            <div style="margin:10px 0;">
              <strong>${item.type.toUpperCase()}:</strong> ${item.text}
            </div>
          `).join('')}
        `;
      } catch {
        resultDiv.textContent = data.output;
      }

    } catch (err) {
      resultDiv.textContent = 'Something went wrong.';
      console.error(err);
    }

    analyzeBtn.textContent = 'Analyze';
    analyzeBtn.disabled = false;
  });
</script>
